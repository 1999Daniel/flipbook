<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

<!-- ── 分享预览元标签（微信/QQ/微博/Twitter等） ── -->
<title>新航道国际物流 · 2026年度展示</title>

<!-- Open Graph（微信、QQ、微博、Facebook 等共用） -->
<meta property="og:type" content="website">

<!-- 微信网页授权（如需要获取用户信息才用到） -->
<meta name="wechat:shareable" content="true">
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --accent: #e2b04a;
    --accent2: #c9a03a;
    --text: #f0e6d3;
    --text-dim: #a09080;
    --safe-bottom: env(safe-area-inset-bottom, 20px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }

  /* ── Loading Screen ── */
  .loading {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.5s, visibility 0.5s;
  }
  .loading.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .loading .logo {
    font-size: 2rem; font-weight: 700; letter-spacing: 0.1em; color: var(--accent);
    margin-bottom: 0.5rem;
  }
  .loading .sub { font-size: 0.9rem; color: var(--text-dim); margin-bottom: 2rem; }
  .loading .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(226,176,74,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading .count { margin-top: 1rem; font-size: 0.85rem; color: var(--text-dim); }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Top Bar ── */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    background: linear-gradient(180deg, rgba(26,26,46,0.95) 0%, rgba(26,26,46,0) 100%);
    pointer-events: none;
  }
  .topbar > * { pointer-events: auto; }
  .topbar .back-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.08); border: none; color: var(--text);
    font-size: 1.2rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(10px);
  }
  .topbar .page-indicator {
    font-size: 0.85rem; color: var(--text-dim);
    background: rgba(255,255,255,0.06); padding: 6px 14px; border-radius: 20px;
    backdrop-filter: blur(10px);
  }
  .topbar .menu-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.08); border: none; color: var(--text);
    font-size: 1.2rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(10px);
  }

  /* ── Main Stage ── */
  .stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    perspective: 2000px;
  }

  /* ── Page Container ── */
  .page-container {
    position: relative;
    width: min(92vw, 88vh * 1.778);
    aspect-ratio: 16 / 9;
    max-width: 1100px;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .page-container.flip-left  { transform: rotateY(-3deg); }
  .page-container.flip-right { transform: rotateY(3deg); }

  /* ── Page ── */
  .page {
    position: absolute; inset: 0;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
    background: #000;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
  }
  .page img {
    width: 100%; height: 100%; object-fit: contain; display: block;
    background: #111;
  }
  .page.current {
    z-index: 10;
    transform: translateX(0);
    opacity: 1;
  }
  .page.prev {
    z-index: 5;
    transform: translateX(-110%) rotateY(8deg) scale(0.92);
    opacity: 0.3;
    pointer-events: none;
  }
  .page.next {
    z-index: 5;
    transform: translateX(110%) rotateY(-8deg) scale(0.92);
    opacity: 0.3;
    pointer-events: none;
  }
  .page.hidden {
    z-index: 1;
    transform: translateX(0) scale(0.9);
    opacity: 0;
    pointer-events: none;
  }

  /* ── Navigation Arrows ── */
  .nav-arrow {
    position: fixed; top: 50%; z-index: 200;
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: var(--text); font-size: 1.3rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transform: translateY(-50%);
    backdrop-filter: blur(10px);
    transition: background 0.2s, opacity 0.3s;
  }
  .nav-arrow:active { background: rgba(255,255,255,0.15); }
  .nav-arrow.left  { left: max(8px, calc((100vw - min(92vw, 88vh * 1.778)) / 2 - 60px)); }
  .nav-arrow.right { right: max(8px, calc((100vw - min(92vw, 88vh * 1.778)) / 2 - 60px)); }
  @media (max-width: 768px) {
    .nav-arrow { opacity: 0; pointer-events: none; }
  }

  /* ── Bottom Bar ── */
  .bottombar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    padding: 16px 16px calc(16px + var(--safe-bottom));
    background: linear-gradient(0deg, rgba(26,26,46,0.95) 0%, rgba(26,26,46,0) 100%);
    display: flex; flex-direction: column; gap: 10px;
    pointer-events: none;
  }
  .bottombar > * { pointer-events: auto; }

  /* Progress Bar */
  .progress-wrap {
    display: flex; align-items: center; gap: 10px; padding: 0 4px;
  }
  .progress-bar {
    flex: 1; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;
  }
  .progress-bar .fill {
    height: 100%; background: var(--accent); border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    width: 5%;
  }
  .progress-num { font-size: 0.75rem; color: var(--text-dim); min-width: 36px; text-align: right; }

  /* Bottom Buttons */
  .bottom-btns {
    display: flex; gap: 8px; justify-content: center;
  }
  .bottom-btn {
    flex: 1; max-width: 140px; padding: 10px 16px;
    border-radius: 24px; border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    color: var(--text); font-size: 0.85rem; cursor: pointer;
    backdrop-filter: blur(10px);
    transition: background 0.2s; text-align: center;
  }
  .bottom-btn:active { background: rgba(255,255,255,0.1); }
  .bottom-btn.accent {
    background: var(--accent); color: #1a1a2e; border-color: var(--accent);
    font-weight: 600;
  }

  /* ── Thumbnail Grid Overlay ── */
  .overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.9);
    display: flex; flex-direction: column;
    transition: opacity 0.35s, visibility 0.35s;
    opacity: 0; visibility: hidden;
  }
  .overlay.open { opacity: 1; visibility: visible; }

  .overlay-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; flex-shrink: 0;
  }
  .overlay-title { font-size: 1.1rem; font-weight: 600; color: var(--accent); }
  .overlay-close {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.1); border: none; color: #fff;
    font-size: 1.3rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  .overlay-grid {
    flex: 1; overflow-y: auto; padding: 8px 16px 24px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px; align-content: start;
  }
  .overlay-grid .thumb {
    aspect-ratio: 16 / 9;
    border-radius: 8px; overflow: hidden;
    border: 2px solid transparent; cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
    background: #222; position: relative;
  }
  .overlay-grid .thumb.active { border-color: var(--accent); }
  .overlay-grid .thumb:active { transform: scale(0.96); }
  .overlay-grid .thumb img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .overlay-grid .thumb .num {
    position: absolute; bottom: 4px; right: 6px;
    font-size: 0.7rem; background: rgba(0,0,0,0.7); color: #fff;
    padding: 2px 6px; border-radius: 4px;
  }

  /* ── Toast ── */
  .toast {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) translateY(20px);
    z-index: 900; background: rgba(0,0,0,0.85); color: #fff;
    padding: 12px 24px; border-radius: 24px; font-size: 0.9rem;
    transition: opacity 0.3s, transform 0.3s;
    opacity: 0; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translate(-50%,-50%) translateY(0); }

  /* ── Cover Page ── */
  .cover {
    position: absolute; inset: 0;
    border-radius: 12px; overflow: hidden;
    background: linear-gradient(135deg, #0f0c29, #1a1a2e, #16213e);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 40px 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.5s;
  }
  .cover.current {
    z-index: 11;
    transform: translateX(0);
    opacity: 1;
  }
  .cover.prev {
    z-index: 5;
    transform: translateX(-110%) rotateY(8deg) scale(0.92);
    opacity: 0.3; pointer-events: none;
  }
  .cover.next {
    z-index: 5;
    transform: translateX(110%) rotateY(-8deg) scale(0.92);
    opacity: 0.3; pointer-events: none;
  }
  .cover.hidden {
    z-index: 1;
    transform: translateX(0) scale(0.9);
    opacity: 0; pointer-events: none;
  }
  .cover .c-logo { font-size: 3rem; margin-bottom: 0.5rem; }
  .cover .c-title { font-size: clamp(1.4rem, 2.5vw, 2rem); font-weight: 700; color: var(--accent); margin-bottom: 0.5rem; letter-spacing: 0.05em; }
  .cover .c-sub { font-size: 0.9rem; color: var(--text-dim); margin-bottom: 2rem; }
  .cover .c-hint {
    font-size: 0.85rem; color: var(--text-dim);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="logo">新航道国际物流</div>
  <div class="sub">NEW CHANNEL INTERNATIONAL LOGISTICS</div>
  <div class="spinner"></div>
  <div class="count" id="loadCount">加载中...</div>
</div>

<!-- Top Bar -->
<div class="topbar">
  <button class="back-btn" onclick="goToCover()" title="回到封面">⌂</button>
  <span class="page-indicator" id="pageIndicator">封面</span>
  <button class="menu-btn" onclick="toggleGrid()" title="目录">⊞</button>
</div>

<!-- Stage -->
<div class="stage" id="stage">
  <div class="page-container" id="pageContainer">
    <!-- Cover -->
    <div class="cover" id="coverPage">
      <div class="c-logo">🚢</div>
      <div class="c-title">新航道国际物流</div>
      <div class="c-sub">NEW CHANNEL INTERNATIONAL LOGISTICS<br>2026年度展示</div>
      <div class="c-hint">← 左右滑动翻页 →</div>
    </div>
    <!-- Pages injected by JS -->
  </div>
</div>

<!-- Nav Arrows -->
<button class="nav-arrow left" onclick="prevPage()" aria-label="上一页">‹</button>
<button class="nav-arrow right" onclick="nextPage()" aria-label="下一页">›</button>

<!-- Bottom Bar -->
<div class="bottombar">
  <div class="progress-wrap">
    <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
    <span class="progress-num" id="progressNum">0/20</span>
  </div>
  <div class="bottom-btns">
    <button class="bottom-btn" onclick="prevPage()">◀ 上一页</button>
    <button class="bottom-btn accent" onclick="nextPage()">下一页 ▶</button>
  </div>
</div>

<!-- Thumbnail Grid -->
<div class="overlay" id="gridOverlay" onclick="if(event.target===this)toggleGrid()">
  <div class="overlay-header">
    <span class="overlay-title">📑 目录浏览</span>
    <button class="overlay-close" onclick="toggleGrid()">✕</button>
  </div>
  <div class="overlay-grid" id="gridContainer"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  const TOTAL_PAGES = 20; // PPT slides
  // CDN 加速（国内加载快 10 倍+），如需关闭改回 'slides/'
  const IMG_DIR = 'https://cdn.jsdelivr.net/gh/1999Daniel/flipbook@main/slides/';

  let currentPage = -1; // -1 = cover
  let isAnimating = false;
  let touchStartX = 0;
  let touchStartY = 0;
  let touchMoved = false;
  let loadedImages = 0;

  // DOM refs
  const loading = document.getElementById('loading');
  const loadCount = document.getElementById('loadCount');
  const coverPage = document.getElementById('coverPage');
  const pageContainer = document.getElementById('pageContainer');
  const pageIndicator = document.getElementById('pageIndicator');
  const progressFill = document.getElementById('progressFill');
  const progressNum = document.getElementById('progressNum');
  const gridOverlay = document.getElementById('gridOverlay');
  const gridContainer = document.getElementById('gridContainer');
  const toast = document.getElementById('toast');
  const stage = document.getElementById('stage');

  // ── Progressive Loading (don't wait for all images) ──
  const imageCache = new Array(TOTAL_PAGES + 1).fill(null);
  const imageLoaded = new Array(TOTAL_PAGES + 1).fill(false);
  const pageElements = new Array(TOTAL_PAGES + 1).fill(null);
  let minLoaded = 0; // highest consecutive loaded page from 1

  function preloadImages() {
    // Build DOM first (don't wait)
    buildPages();
    buildGrid();
    if (pageElements[1]) pageElements[1].className = 'page next';
    updateUI();
    loadProgress();

    // Load all images in background, prioritizing first pages
    const order = [];
    for (let i = 1; i <= TOTAL_PAGES; i++) order.push(i);
    // Start with first 3 pages
    const priority = [1, 2, 3];
    priority.forEach(i => loadImage(i));

    // Then load rest with slight delay to not block first pages
    let idx = 3;
    function loadNext() {
      if (idx >= TOTAL_PAGES) return;
      idx++;
      loadImage(order[idx - 1]);
      setTimeout(loadNext, 100);
    }
    setTimeout(loadNext, 500);

    // Hide loading screen quickly
    setTimeout(() => {
      loading.classList.add('hidden');
      loadCount.textContent = '准备就绪';
    }, 800);
  }

  function loadImage(i) {
    if (imageLoaded[i]) return;
    const img = new Image();
    img.onload = img.onerror = () => {
      imageLoaded[i] = true;
      loadedImages++;
      loadCount.textContent = `加载中 ${loadedImages}/${TOTAL_PAGES}`;
      // Update the actual page element src if it was placeholder
      if (pageElements[i]) {
        const el = pageElements[i].querySelector('img');
        if (el && (!el.src || el.src.includes('data:') || el.dataset.waiting === '1')) {
          el.src = IMG_DIR + 'slide_' + i + '.jpg';
          el.style.opacity = '1';
          el.dataset.waiting = '0';
        }
      }
      // Update grid thumbnail
      const thumb = gridContainer.querySelector('[data-page="' + i + '"] img');
      if (thumb && (!thumb.src || thumb.src.includes('data:'))) {
        thumb.src = IMG_DIR + 'slide_' + i + '.jpg';
      }
      if (loadedImages >= TOTAL_PAGES) {
        loadCount.textContent = '准备就绪';
      }
    };
    img.src = IMG_DIR + 'slide_' + i + '.jpg';
    imageCache[i] = img;
  }

  function finishLoading() {
    // No longer used — pages show immediately
  }

  // ── Build Page DOM ──
  function buildPages() {
    for (let i = 1; i <= TOTAL_PAGES; i++) {
      const div = document.createElement('div');
      div.className = 'page hidden';
      // Show placeholder until image loads
      const loaded = imageLoaded[i];
      div.innerHTML = '<div class="img-placeholder" style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#555;font-size:0.85rem\">📄 第' + i + '页</div>'
        + '<img src="' + (loaded ? IMG_DIR + 'slide_' + i + '.jpg' : '') + '" alt="第' + i + '页" loading="lazy"'
        + ' style="position:relative;z-index:1;opacity:' + (loaded ? '1' : '0') + ';transition:opacity 0.3s"'
        + ' data-waiting="' + (loaded ? '0' : '1') + '">';
      pageContainer.appendChild(div);
      pageElements[i] = div;
    }
  }

  function preloadNearby(page) {
    const range = 2;
    for (let i = page - range; i <= page + range; i++) {
      if (i >= 1 && i <= TOTAL_PAGES && !imageLoaded[i]) {
        loadImage(i);
      }
    }
  }

  function getPageEl(i) {
    if (i === -1) return coverPage;
    return pageElements[i];
  }

  // ── Navigation ──
  function goToPage(target) {
    if (isAnimating || target === currentPage) return;
    if (target < -1 || target > TOTAL_PAGES) return;
    isAnimating = true;

    const goingForward = target > currentPage;

    // Reset: hide all slide pages
    for (let i = 1; i <= TOTAL_PAGES; i++) {
      if (pageElements[i]) pageElements[i].className = 'page hidden';
    }
    // Reset cover
    coverPage.className = 'cover';
    coverPage.style.display = '';

    // Helper: show an element with a given class
    function showAs(pageNum, cls) {
      if (pageNum === -1) {
        coverPage.className = 'cover ' + cls;
      } else if (pageNum >= 1 && pageNum <= TOTAL_PAGES && pageElements[pageNum]) {
        pageElements[pageNum].className = 'page ' + cls;
      }
    }

    // ── Current page (center, full opacity) ──
    showAs(target, 'current');

    // ── Previous page (left neighbor, dimmed) ──
    if (target >= 0) {
      const prevNum = target - 1;
      if (prevNum === 0) showAs(-1, 'prev');   // page before 1 = cover
      else if (prevNum >= 1) showAs(prevNum, 'prev');
    }

    // ── Next page (right neighbor, dimmed) ──
    if (target < TOTAL_PAGES) {
      const nextNum = target + 1;
      if (target === -1) showAs(1, 'next');    // page after cover = 1
      else showAs(nextNum, 'next');
    }

    // ── Flip animation on container ──
    const dir = goingForward ? 'flip-left' : 'flip-right';
    pageContainer.classList.add(dir);
    setTimeout(() => pageContainer.classList.remove(dir), 400);

    currentPage = target;
    preloadNearby(target);

    setTimeout(() => { isAnimating = false; }, 450);

    updateUI();
    saveProgress();
  }

  function nextPage() {
    if (currentPage === -1) {
      goToPage(1);
    } else if (currentPage < TOTAL_PAGES) {
      goToPage(currentPage + 1);
    } else {
      showToast('已经是最后一页了');
    }
  }

  function prevPage() {
    if (currentPage === 1) {
      goToCover();
    } else if (currentPage > 1) {
      goToPage(currentPage - 1);
    } else {
      showToast('已经是封面了');
    }
  }

  function goToCover() {
    goToPage(-1);
  }

  // ── UI Updates ──
  function updateUI() {
    if (currentPage === -1) {
      pageIndicator.textContent = '封面';
      progressFill.style.width = '0%';
      progressNum.textContent = '0/' + TOTAL_PAGES;
    } else {
      pageIndicator.textContent = currentPage + ' / ' + TOTAL_PAGES;
      const pct = (currentPage / TOTAL_PAGES) * 100;
      progressFill.style.width = pct + '%';
      progressNum.textContent = currentPage + '/' + TOTAL_PAGES;
    }
    updateGridActive();
  }

  // ── Grid View ──
  function buildGrid() {
    for (let i = 1; i <= TOTAL_PAGES; i++) {
      const div = document.createElement('div');
      div.className = 'thumb';
      div.innerHTML = '<img src="' + IMG_DIR + 'slide_' + i + '.jpg" alt="第' + i + '页" loading="lazy"><span class="num">' + i + '</span>';
      div.onclick = () => {
        toggleGrid();
        goToPage(i);
      };
      div.setAttribute('data-page', i);
      gridContainer.appendChild(div);
    }
  }

  function updateGridActive() {
    gridContainer.querySelectorAll('.thumb').forEach(t => {
      t.classList.toggle('active', parseInt(t.getAttribute('data-page')) === currentPage);
    });
  }

  function toggleGrid() {
    gridOverlay.classList.toggle('open');
  }

  // ── Click/Tap Zone Navigation ──
  stage.addEventListener('click', e => {
    if (gridOverlay.classList.contains('open')) return;
    if (isAnimating) return;
    const rect = stage.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const third = rect.width / 3;
    if (x < third) {
      prevPage();
    } else if (x > third * 2) {
      nextPage();
    }
    // middle third: do nothing (allow viewing)
  });

  // ── Touch Swipe ──
  stage.addEventListener('touchstart', e => {
    if (gridOverlay.classList.contains('open')) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchMoved = false;
  }, { passive: true });

  stage.addEventListener('touchmove', e => {
    if (gridOverlay.classList.contains('open')) return;
    touchMoved = true;
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy)) {
      e.preventDefault();
    }
  }, { passive: false });

  stage.addEventListener('touchend', e => {
    if (gridOverlay.classList.contains('open')) return;
    if (!touchMoved) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const threshold = 50;
    if (Math.abs(dx) > threshold) {
      if (dx < 0) nextPage();
      else prevPage();
    }
  });

  // ── Keyboard ──
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
      e.preventDefault();
      nextPage();
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      prevPage();
    } else if (e.key === 'Home') {
      e.preventDefault();
      goToCover();
    } else if (e.key === 'End') {
      e.preventDefault();
      goToPage(TOTAL_PAGES);
    } else if (e.key === 'Escape') {
      gridOverlay.classList.remove('open');
    }
  });

  // ── Mouse Wheel ──
  let wheelAccum = 0;
  stage.addEventListener('wheel', e => {
    if (gridOverlay.classList.contains('open')) return;
    e.preventDefault();
    wheelAccum += e.deltaY;
    if (Math.abs(wheelAccum) > 60) {
      if (wheelAccum > 0) nextPage();
      else prevPage();
      wheelAccum = 0;
    }
  }, { passive: false });

  // ── Toast ──
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
  }

  // ── Progress Persistence ──
  function saveProgress() {
    try {
      localStorage.setItem('flipbook_current_page', currentPage);
    } catch(e) {}
  }

  function loadProgress() {
    try {
      const saved = parseInt(localStorage.getItem('flipbook_current_page'));
      if (!isNaN(saved) && saved >= -1 && saved <= TOTAL_PAGES) {
        // Start from cover, but show hint to resume
        if (saved > 0) {
          showToast('上次看到第 ' + saved + ' 页，点击目录可跳转');
        }
      }
    } catch(e) {}
  }

  // ── Expose to global scope (for onclick handlers) ──
  window.prevPage = prevPage;
  window.nextPage = nextPage;
  window.goToCover = goToCover;
  window.toggleGrid = toggleGrid;

  // ── Init ──
  preloadImages();
})();
</script>
</body>
</html>
